name: Update AI Sentiment Index

on:
  schedule:
    - cron: '0 2,8,14,20 * * *'  # Every 6 hours at 2am, 8am, 2pm, 8pm UTC
  workflow_dispatch:          # Manual trigger

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch feeds and rebuild
        run: python fetch_and_build.py

      - name: Commit and push
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data.json index.html
          git diff --staged --quiet || git commit -m "Update sentiment data $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
