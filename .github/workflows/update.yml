name: Update AI Sentiment Index

on:
  schedule:
    - cron: '0 2,8,14,20 * * *'  # Every 6 hours at 2am, 8am, 2pm, 8pm UTC
  workflow_dispatch:          # Manual trigger

permissions:
  contents: read
  issues: write

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch RSS feeds and update Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/fetch_and_build.py

      # Open a GitHub issue on failure so the dashboard doesn't silently go
      # stale. Deduplicates by label so repeated failures append a comment
      # instead of spawning a new issue each run.
      - name: Alert on failure
        if: failure()
        uses: actions/github-script@v7
        env:
          RUN_URL: ${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}
        with:
          script: |
            const label = 'ingestion-failure';
            const body = `Ingestion workflow failed.\n\nRun: ${process.env.RUN_URL}\n\nDashboard data will go stale until the next successful run.`;

            const existing = await github.rest.issues.listForRepo({
              owner: context.repo.owner,
              repo: context.repo.repo,
              state: 'open',
              labels: label,
              per_page: 1,
            });

            if (existing.data.length > 0) {
              await github.rest.issues.createComment({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: existing.data[0].number,
                body,
              });
            } else {
              await github.rest.issues.create({
                owner: context.repo.owner,
                repo: context.repo.repo,
                title: 'Ingestion workflow failing',
                body,
                labels: [label],
              });
            }
