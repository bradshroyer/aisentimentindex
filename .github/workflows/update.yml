name: Update AI Sentiment Index

on:
  schedule:
    - cron: '0 2,8,14,20 * * *'  # Every 6 hours at 2am, 8am, 2pm, 8pm UTC
  workflow_dispatch:          # Manual trigger

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Fetch RSS feeds and update Supabase
        env:
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/fetch_and_build.py

      - name: Backfill from NewsAPI.ai
        env:
          NEWSAPI_AI_KEY: ${{ secrets.NEWSAPI_AI_KEY }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          SUPABASE_SERVICE_ROLE_KEY: ${{ secrets.SUPABASE_SERVICE_ROLE_KEY }}
        run: python scripts/backfill_newsapi_ai.py
